name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel REST API
        run: |
          # Get the latest commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          
          # Create deployment using Vercel's REST API (works with vcp_ tokens)
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"vapouk-website\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"1288717570\",
                \"ref\": \"main\",
                \"sha\": \"$COMMIT_SHA\"
              },
              \"projectSettings\": {
                \"framework\": null,
                \"buildCommand\": null,
                \"outputDirectory\": null,
                \"installCommand\": null
              },
              \"target\": \"production\"
            }")
          
          echo "$RESPONSE" | python3 -c "
import sys, json
r = json.load(sys.stdin)
url = r.get('url', '')
err = r.get('error', {})
if url:
    print('Deployed to: https://' + url)
elif err:
    print('Error:', err.get('message', str(err)))
else:
    print('Response:', str(r)[:300])
"
